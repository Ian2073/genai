# ============================================================
# 多模態兒童故事生成系統 — Docker Compose
# ============================================================
# 使用方式:
#   docker compose up          # 生成 1 本故事
#   docker compose run --rm genai --count 5 --age 6-8
# ============================================================

services:
  genai:
    build:
      context: .
      dockerfile: Dockerfile
    image: genai:latest
    container_name: genai
    working_dir: /app
    init: true

    gpus: all

    # GPU 支援 (需要 nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

    volumes:
      # 專案程式碼熱掛載：本機修改可立即反映到容器（無須重建 image）
      - ./:/app

      # 模型目錄 (必須，~36GB)
      - ./models:/app/models:ro

      # 輸出目錄
      - ./output:/app/output

      # 日誌
      - ./logs:/app/logs

      # 可觀測性報告
      - ./runs:/app/runs
      # XTTS 說話人樣本 (語音合成用)
      # - ./samples:/app/models/XTTS-v2/samples:ro

      # 預設生成 1 本書
    command: [ "--count", "1" ]

    # 環境變數
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}

    # 共享記憶體 (PyTorch DataLoader 需要)
    shm_size: '2gb'

    # 重啟策略
    restart: "no"

  story-checker:
    build:
      context: .
      dockerfile: evaluation/Dockerfile
    image: story-checker:latest
    command: bash -lc "sleep infinity"
    volumes:
      - ./evaluation:/app
      - ${MODEL_ROOT_HOST_PATH:-./models}:/app/models:ro
      - ./output:/app/output
      - ./reports:/app/reports
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      - COREF_SERVICE_URL=${COREF_SERVICE_URL:-http://coref-service:8001}
      - TOKENIZERS_PARALLELISM=false
      - DEFAULT_MODEL_PATH=${DEFAULT_MODEL_PATH:-/app/models/Qwen2.5-14B}
      - USE_4BIT_QUANTIZATION=${USE_4BIT_QUANTIZATION:-true}
      - USE_CPU_HYBRID=${USE_CPU_HYBRID:-true}
      - USE_CPU_FOR_SEMANTIC=${USE_CPU_FOR_SEMANTIC:-true}
      - DISABLE_CALIBRATION=${DISABLE_CALIBRATION:-true}
      - COREF_BACKEND_MODE=${COREF_BACKEND_MODE:-auto}
      - COREF_TIMEOUT_SEC=${COREF_TIMEOUT_SEC:-120}
    depends_on:
      coref-service:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  coref-service:
    build:
      context: .
      dockerfile: evaluation/Dockerfile.coref
    image: coref-service:latest
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - COREF_DEVICE=${COREF_DEVICE:-auto}
      - COREF_MAX_TOKENS=${COREF_MAX_TOKENS:-2048}
    volumes:
      - ${MODEL_ROOT_HOST_PATH:-./models}:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
