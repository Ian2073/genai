# ============================================================
# 多模態兒童故事生成系統 — Docker Compose
# ============================================================
# 使用方式:
#   docker compose up          # 生成 1 本故事
#   docker compose run --rm genai --count 5 --age 6-8
# ============================================================

services:
  genai:
    build:
      context: .
      dockerfile: Dockerfile
    image: genai:latest
    container_name: genai
    working_dir: /app
    init: true

    gpus: all

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

    volumes:
      - ./:/app
      - ./models:/app/models:ro
      - ./output:/app/output
      - ./logs:/app/logs
      - ./runs:/app/runs
      - ./reports:/app/reports

    command: [ "--count", "1" ]

    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      # Evaluation-specific environmental variables
      - TOKENIZERS_PARALLELISM=false
      - DEFAULT_MODEL_PATH=${DEFAULT_MODEL_PATH:-/app/models/Qwen2.5-14B-Instruct-GPTQ-Int4}
      - USE_4BIT_QUANTIZATION=${USE_4BIT_QUANTIZATION:-true}
      - USE_CPU_HYBRID=${USE_CPU_HYBRID:-true}
      - USE_CPU_FOR_SEMANTIC=${USE_CPU_FOR_SEMANTIC:-true}
      - DISABLE_CALIBRATION=${DISABLE_CALIBRATION:-true}
      - COREF_BACKEND_MODE=${COREF_BACKEND_MODE:-local}
      - COREF_TIMEOUT_SEC=${COREF_TIMEOUT_SEC:-120}
      - COREF_ENABLE_LOCAL_FASTCOREF=${COREF_ENABLE_LOCAL_FASTCOREF:-true}
      - SPACY_PREFER_GPU=${SPACY_PREFER_GPU:-true}
      - SPACY_REQUIRE_TRF=${SPACY_REQUIRE_TRF:-false}

    shm_size: '2gb'
    restart: "no"
